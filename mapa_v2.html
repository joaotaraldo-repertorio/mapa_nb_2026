<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Rápido - Noite Beneficente</title>
    <style>
        /* =========================================
           O SEU VISUAL ORIGINAL (Ligeiramente adaptado para ser dinâmico)
           ========================================= */
        :root {
            --azul-fundo: #0A192F; --azul-card: #112240; --ciano-destaque: #66FFFF;
            --texto-claro: #e6f1ff; --cor-palco: #8A2BE2; --cor-reservada: #ffc107;
            --cor-vendida-texto: #ff4d4d; --cor-livre-texto: #4ade80;
        }

        body { background-color: var(--azul-fundo); color: var(--texto-claro); font-family: Arial, sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #area-exportacao { width: 100%; max-width: 1300px; display: flex; flex-direction: column; align-items: center; background-color: var(--azul-fundo); padding: 10px; border-radius: 8px; }

        .painel-topo { width: 100%; display: flex; justify-content: center; align-items: center; background-color: var(--azul-card); padding: 15px 30px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; flex-direction: column;}
        .titulo-evento { text-align: center; color: var(--ciano-destaque); margin: 0; font-size: 32px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .status-sistema { color: #f59e0b; font-weight: bold; margin-top: 10px; font-size: 14px;}

        #container-salao { width: 100%; padding: 0 70px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; margin-bottom: 15px;}
        
        .palco { width: 50%; background-color: var(--cor-palco); color: #fff; text-align: center; padding: 10px 0; font-size: 22px; font-weight: bold; letter-spacing: 5px; border-radius: 8px; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 25px; z-index: 2;}
        
        /* Tarjas Laterais (Visuais) */
        .tarja-lateral { position: absolute; width: 45px; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; border-radius: 8px; text-align: center; letter-spacing: 2px; text-transform: uppercase; z-index: 1; }
        .tarja-texto { writing-mode: vertical-rl; transform: rotate(180deg); margin-top: 10px; }
        .tarja-wc-masc { left: 0; top: 13%; height: 12%; border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tarja-wc-fem { left: 0; top: 26%; height: 12%; border-color: #ec4899; background-color: rgba(236, 72, 153, 0.15); color: #ec4899; }
        .tarja-entrada { right: 0; top: 80%; height: 15%; border-color: var(--ciano-destaque); background-color: rgba(102, 255, 255, 0.15); color: var(--ciano-destaque); }

        /* Estrutura Dinâmica dos Setores e Mesas */
        .setor { padding: 12px 20px; border-radius: 8px; width: 100%; box-sizing: border-box; z-index: 2; margin-bottom: 20px;}
        .setor h3 { margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; text-align: center; font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); color: var(--ciano-destaque); text-transform: uppercase;}
        
        /* Flexbox Mágico: as mesas se ajeitam sozinhas não importa a quantidade */
        .fileira-mesas { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        
        .wrapper-mesa { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 120px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .wrapper-mesa:hover { transform: scale(1.05); }

        /* A Bolinha da Mesa */
        .bolinha-mesa { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2);}
        
        .texto-acima { font-size: 11px; font-weight: bold; text-transform: uppercase; height: 14px; letter-spacing: 1px; }
        .texto-abaixo { font-size: 13px; color: #ffffff; text-align: center; width: 100%; white-space: normal; word-wrap: break-word; line-height: 1.1; font-weight: bold; min-height: 15px; }

        /* Cores Dinâmicas baseadas no Status */
        .status-livre .texto-acima { color: var(--cor-livre-texto); }
        .status-livre .bolinha-mesa { background-color: #22c55e; } /* Verde mais vivo */
        
        .status-reservada .texto-acima { color: var(--cor-reservada); }
        .status-reservada .bolinha-mesa { background-color: var(--cor-reservada); color: #000; }
        
        .status-vendida .texto-acima { color: var(--cor-vendida-texto); }
        .status-vendida .bolinha-mesa { background-color: #ef4444; } /* Vermelho mais vivo */

        /* =========================================
           VISUAL DO POP-UP (MODAL DE EDIÇÃO)
           ========================================= */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--azul-card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000; width: 320px; border: 1px solid var(--ciano-destaque); color: var(--texto-claro); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 47, 0.8); z-index: 999; backdrop-filter: blur(3px); }
        .modal h3 { margin-top: 0; text-align: center; color: var(--ciano-destaque); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal label { font-size: 13px; font-weight: bold; display: block; margin-top: 12px; color: #8892b0;}
        .modal input, .modal select { width: 100%; margin-top: 5px; padding: 10px; box-sizing: border-box; border: 1px solid #233554; border-radius: 6px; background: #0A192F; color: white; outline: none; }
        .modal input:focus, .modal select:focus { border-color: var(--ciano-destaque); }
        
        .btn { padding: 12px; font-weight: bold; border: none; cursor: pointer; width: 100%; border-radius: 6px; margin-top: 15px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-salvar { background: var(--ciano-destaque); color: #0A192F; }
        .btn-fechar { background: transparent; color: #8892b0; border: 1px solid #8892b0; margin-top: 10px; }
        .btn-fechar:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="area-exportacao">
        <div class="painel-topo">
            <h1 class="titulo-evento">19ª Noite Beneficente</h1>
            <div class="status-sistema" id="status-msg">Sincronizando com o Google Sheets...</div>
        </div>

        <div id="container-salao">
            <div class="palco">PALCO</div>

            <div class="tarja-lateral tarja-wc-masc"><span class="tarja-texto">WC Masc</span></div>
            <div class="tarja-lateral tarja-wc-fem"><span class="tarja-texto">WC Fem</span></div>
            <div class="tarja-lateral tarja-entrada"><span class="tarja-texto">Entrada</span></div>

            <div id="mapa-dinamico" style="width: 100%;"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="fecharModal()"></div>
    <div class="modal" id="modal">
        <h3 id="modal-title">Editar Mesa</h3>
        
        <label>Status da Venda:</label>
        <select id="modal-status">
            <option value="Livre">Livre</option>
            <option value="Reservada">Reservada</option>
            <option value="Vendida">Vendida</option>
        </select>
        
        <label>Nome do Comprador no Mapa:</label>
        <input type="text" id="modal-nome" placeholder="Ex: João Taraldo">
        
        <label>Telefone / WhatsApp:</label>
        <input type="text" id="modal-telefone" placeholder="(00) 00000-0000">
        
        <label>E-mail de Contato:</label>
        <input type="email" id="modal-email" placeholder="nome@email.com">
        
        <button class="btn btn-salvar" onclick="salvarMesa()">Gravar na Planilha</button>
        <button class="btn btn-fechar" onclick="fecharModal()">Cancelar</button>
    </div>

    <script>
        // Sua URL da API do Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycby6hZ1cD-uIPafXIpRDe2DJzmYwjP4IRQgysxbVPNJOlKNDlE8ALvUTyBsoJlSQL2k/exec';
        let mesasData = [];

        async function carregarMesas() {
            try {
                const response = await fetch(API_URL);
                mesasData = await response.json();
                renderizarMapaDinamico();
                document.getElementById('status-msg').innerHTML = "🟢 MAPA ATUALIZADO E ONLINE";
            } catch (error) {
                document.getElementById('status-msg').innerHTML = "🔴 ERRO DE CONEXÃO";
            }
        }

        function renderizarMapaDinamico() {
            const container = document.getElementById('mapa-dinamico');
            container.innerHTML = ''; // Limpa o carregamento anterior
            
            // 1. Agrupar as mesas por "Setor" automaticamente
            const setores = {};
            mesasData.forEach(mesa => {
                const setorNome = mesa.setor || "Sem Setor";
                if (!setores[setorNome]) {
                    setores[setorNome] = [];
                }
                setores[setorNome].push(mesa);
            });

            // 2. Criar o HTML de cada setor dinamicamente
            for (const [nomeSetor, mesasDoSetor] of Object.entries(setores)) {
                
                // Cria a caixa do Setor
                const divSetor = document.createElement('div');
                divSetor.className = 'setor';
                
                // Título do Setor
                const titulo = document.createElement('h3');
                titulo.innerText = `Setor ${nomeSetor}`;
                divSetor.appendChild(titulo);

                // Cria o container das mesas (Flexbox cuida das fileiras sozinho)
                const divFileira = document.createElement('div');
                divFileira.className = 'fileira-mesas';

                // Adiciona cada mesa dentro desse setor
                mesasDoSetor.forEach(mesa => {
                    const statusClass = (mesa.status || "livre").toLowerCase().trim();
                    const nomeDisplay = mesa.nome ? mesa.nome : (statusClass === "livre" ? "Disponível" : "---");

                    const mesaWrapper = document.createElement('div');
                    mesaWrapper.className = `wrapper-mesa status-${statusClass}`;
                    mesaWrapper.onclick = () => abrirModal(mesa);

                    mesaWrapper.innerHTML = `
                        <div class="texto-acima">${mesa.status || "Livre"}</div>
                        <div class="bolinha-mesa">${mesa.id}</div>
                        <div class="texto-abaixo">${nomeDisplay}</div>
                    `;

                    divFileira.appendChild(mesaWrapper);
                });

                divSetor.appendChild(divFileira);
                container.appendChild(divSetor);
            }
        }

        // Funções do Modal de Edição
        function abrirModal(mesa) {
            document.getElementById('modal-title').innerText = `Mesa ${mesa.id} - Setor ${mesa.setor}`;
            document.getElementById('modal-status').value = mesa.status || "Livre";
            document.getElementById('modal-nome').value = mesa.nome || "";
            document.getElementById('modal-telefone').value = mesa.telefone || "";
            document.getElementById('modal-email').value = mesa.email || ""; 

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        function salvarMesa() {
            alert("Sexta-feira falando: A lataria tá pronta! Nosso próximo passo é o código para enviar as edições para a planilha.");
            fecharModal();
        }

        // Dá a partida no motor!
        carregarMesas();
    </script>

</body>
</html>
